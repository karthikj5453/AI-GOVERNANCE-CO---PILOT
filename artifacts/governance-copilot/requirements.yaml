packages:
  "recharts": "Powerful, responsive charting library for dashboard metrics"
  "react-leaflet": "React components for Leaflet maps to build the interactive complaint heatmap"
  "leaflet": "Core map library required for react-leaflet"
  "@types/leaflet": "TypeScript definitions for leaflet"
  "framer-motion": "For smooth page transitions and micro-interactions"
  "date-fns": "For formatting dates in complaints and alerts"

images:
  - path: "artifacts/governance-copilot/public/images/logo.png"
    description: "A minimal, modern geometric logo for an AI government intelligence platform. Deep navy blue and glowing cyan colors, abstract shield or eye icon, isolated on transparent background."
    aspect_ratio: "1:1"
  - path: "artifacts/governance-copilot/public/images/auth-bg.png"
    description: "Abstract deep dark navy and slate gradient background with subtle glowing cyan data nodes and connecting lines, tech and intelligence vibe."
    aspect_ratio: "16:9"

notes:
  - "Assuming generated API hooks from @workspace/api-client-react are available and correctly type-checked"
  - "CartoDB Dark basemap is used for the Leaflet heatmap to match the dark UI theme"
  - "Default constituencyId 'CONST-001' is used for dashboard data fetching"
