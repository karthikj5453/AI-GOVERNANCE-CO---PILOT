kind = "web"
previewPath = "/"
title = "AI Governance Co-Pilot"
version = "1.0.0"
id = "artifacts/governance-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21312
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/governance-copilot run dev"

[services.env]
PORT = "21312"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/governance-copilot", "run", "build"]
publicDir = "artifacts/governance-copilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
